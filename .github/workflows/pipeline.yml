name: Job Market Pipeline

on:
  push:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: job-market-pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dbt-postgres

      - name: Run LinkedIn Crawler
        env:
          DB_CONN: ${{ secrets.DB_CONN }}
        run: |
          python crawler/linkedin_crawler.py

      - name: Run dbt models
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASS: ${{ secrets.SUPABASE_PASSWORD }}
          DB_CONN: ${{ secrets.DB_CONN }}
        run: |
          dbt deps
          dbt run --project-dir dbt_job_market --profiles-dir dbt_job_market --target dev

      - name: Send Discord Alerts
        env:
          DB_CONN: ${{ secrets.DB_CONN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python alert_bot.py
